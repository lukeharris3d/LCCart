<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Gallery</title>
    <style>
        /* Center the container in the middle of the screen */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5; /* Light background to see the white buttons */
        }

        /* Vertical stack for the buttons */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Space between buttons */
            align-items: center;
        }

        /* The Button Style based on your Babylon.js properties */
        .custom-btn {
            /* Basic layout */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            cursor: pointer;
            min-width: 160px; /* Added to ensure text fits nicely */
            padding: 0 20px;

            /* Properties from your code */
            height: 44px;
            color: #000000;
            background-color: #FFFFFF;
            border-radius: 8px;
            border: 0px; /* thickness = 0 */
            font-size: 13px;
            font-family: "Segoe UI", sans-serif;
            font-weight: 400;

            /* Shadow properties */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); /* offsetY 4, blur 10, shadowColor */
            
            /* Smooth transition for hover */
            transition: background-color 0.2s, transform 0.1s;
        }

        /* Simple hover effect for better UX */
        .custom-btn:hover {
            background-color: #fdfdfd;
            transform: translateY(-1px);
        }

        .custom-btn:active {
            transform: translateY(0px);
        }
    </style>
</head>
<body>

    <div class="button-container">
        <a href="https://lukeharris3d.github.io/LCCart/Elysha_Rei.html" class="custom-btn">
            Elysha Rei
        </a>
        
        <a href="https://lukeharris3d.github.io/LCCart/Rachel_Lee.html" class="custom-btn">
            Rachel Lee
        </a>
    </div>

</body>
</html>
