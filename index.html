<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon.js - UI Toggle Models</title>
    <style>
      html,
      body {
        overflow: hidden;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #111;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      /* UI Styling */
      #ui-container {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        font-family: sans-serif;
      }

      .toggle-btn {
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 4px;
        cursor: pointer;
        backdrop-filter: blur(5px);
        transition: background 0.2s;
        min-width: 120px;
      }

      .toggle-btn:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      /* State for when model is hidden */
      .toggle-btn.hidden-state {
        background: rgba(255, 0, 0, 0.3);
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>

    <!-- UI Buttons -->
    <div id="ui-container">
      <button id="btnGhost" class="toggle-btn">Toggle Ghost</button>
      <button id="btnMurph" class="toggle-btn">Toggle Murph</button>
    </div>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

    <script>
      const canvas = document.getElementById("renderCanvas");
      const engine = new BABYLON.Engine(canvas, true);

      const createScene = async function () {
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(0.1, 0.1, 0.1, 1);

        const camera = new BABYLON.ArcRotateCamera(
          "camera",
          -Math.PI / 2.5,
          Math.PI / 2.2,
          7,
          new BABYLON.Vector3(1, 1, 0),
          scene
        );
        camera.attachControl(canvas, true);

        const light = new BABYLON.HemisphericLight(
          "light",
          new BABYLON.Vector3(0, 1, 0),
          scene
        );
        light.intensity = 0.8;

        const env = scene.createDefaultEnvironment({
          createGround: true,
          groundSize: 10,
          createSkybox: false,
        });

        const baseUrl = "https://lukeharris3d.github.io/GLB/";

        // Variables to hold the model root nodes
        let ghostMesh = null;
        let murphMesh = null;

        // Load Ghost
        try {
          const ghostResult = await BABYLON.SceneLoader.ImportMeshAsync(
            "",
            baseUrl,
            "Ghost1.glb",
            scene
          );
          ghostMesh = ghostResult.meshes[0];
        } catch (e) {
          console.error(e);
        }

        // Load Murph
        try {
          const murphResult = await BABYLON.SceneLoader.ImportMeshAsync(
            "",
            baseUrl,
            "Murph.glb",
            scene
          );
          murphMesh = murphResult.meshes[0];
          murphMesh.position.x = 2;
        } catch (e) {
          console.error(e);
        }

        // --- Button Logic ---

        const btnGhost = document.getElementById("btnGhost");
        btnGhost.addEventListener("click", () => {
          if (ghostMesh) {
            // .setEnabled(false) hides the mesh and stops it from being processed
            const isVisible = ghostMesh.isEnabled();
            ghostMesh.setEnabled(!isVisible);

            // Toggle button visual style
            btnGhost.classList.toggle("hidden-state", isVisible);
          }
        });

        const btnMurph = document.getElementById("btnMurph");
        btnMurph.addEventListener("click", () => {
          if (murphMesh) {
            const isVisible = murphMesh.isEnabled();
            murphMesh.setEnabled(!isVisible);

            // Toggle button visual style
            btnMurph.classList.toggle("hidden-state", isVisible);
          }
        });

        return scene;
      };

      createScene().then((scene) => {
        engine.runRenderLoop(function () {
          scene.render();
        });
      });

      window.addEventListener("resize", function () {
        engine.resize();
      });
    </script>
  </body>
</html>
